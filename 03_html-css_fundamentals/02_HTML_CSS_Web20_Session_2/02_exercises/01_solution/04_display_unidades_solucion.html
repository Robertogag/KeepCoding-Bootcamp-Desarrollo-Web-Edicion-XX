<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solución · Display y unidades</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .wrapper {
      display: flex;
      gap: 1rem;
    }

    .item {
      width: 30%;
      min-height: 120px;
      background: #f2e9ff;
      border: 1px solid #d4b6ff;
      display: inline-block;
      padding: 1rem;
      font-size: 1.1rem;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h1>Display y unidades</h1>
  <section class="wrapper">
    <div class="item">Caja 1</div>
    <div class="item">Caja 2</div>
    <div class="item">Caja 3</div>
  </section>
</body>
</html>
