<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solución · Tipografía y colores</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 32px;
      color: #222;
      background: #fafafa;
    }

    h1 {
      font-size: 3rem;
      color: #6a0dad;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .secondary {
      color: #666;
    }

    button {
      margin-top: 12px;
      background: #6a0dad;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>Bienvenido al módulo de CSS</h1>
    <p>En este ejercicio vamos a trabajar la jerarquía visual utilizando tipografía, contraste y color.</p>
    <p class="secondary">Este texto debe verse como contenido secundario.</p>
    <button>Comenzar</button>
  </main>
</body>
</html>
