<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solución · Box Model</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .box {
      width: 320px;
      padding: 24px;
      border: 2px solid #6a0dad;
      margin-bottom: 24px;
      background: #f8f5ff;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h1>Práctica de Box Model</h1>
  <div class="box">
    Esta caja debe tener padding, borde, ancho y margen bien definidos.
  </div>
  <p>Este texto debe quedar separado visualmente de la caja.</p>
</body>
</html>
