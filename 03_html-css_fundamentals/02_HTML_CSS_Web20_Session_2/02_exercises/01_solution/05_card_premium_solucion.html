<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solución · Card premium</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f7f7fb;
    }

    .card {
      max-width: 420px;
      padding: 24px;
      border: 1px solid #e4d7ff;
      border-radius: 18px;
      background: white;
      box-shadow: 0 10px 30px rgba(106, 13, 173, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 36px rgba(106, 13, 173, 0.14);
    }

    .card h2 {
      margin-top: 0;
      color: #6a0dad;
    }

    .card p {
      line-height: 1.6;
      color: #444;
    }

    .card button {
      margin-top: 12px;
      background: #6a0dad;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    .card button:hover {
      background: #5a0898;
    }
  </style>
</head>
<body>
  <article class="card">
    <h2>Plan Pro</h2>
    <p>Accede a todos los contenidos del bootcamp con una experiencia visual más profesional.</p>
    <button>Elegir plan</button>
  </article>
</body>
</html>
