<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio · Importación de fuentes</title>

  <!--
    EJERCICIO · FORMAS DE IMPORTAR FUENTES EN CSS

    OBJETIVO
    Practicar tres formas distintas de trabajar con tipografía en una página web:
    1. Usar una fuente del sistema ya existente.
    2. Importar una Google Font.
    3. Configurar una fuente descargada con @font-face.

    INSTRUCCIONES
    1. Crea estilos para las tres tarjetas de ejemplo.
    2. La primera tarjeta debe usar una fuente del sistema.
    3. La segunda tarjeta debe usar una fuente importada desde Google Fonts.
    4. La tercera tarjeta debe usar una fuente local descargada.
    5. Para la fuente descargada, simula una carpeta /fonts y referencia el archivo con @font-face.

    IMPORTANTE
    - No hace falta que la fuente descargada exista realmente para completar el ejercicio.
    - Puedes dejar preparada la ruta del archivo local.
    - Todo el trabajo debe hacerse en el bloque <style>.
  -->

  <style>
    /*
      TODO:
      1. Importa una Google Font.
      2. Declara una fuente local con @font-face.
      3. Aplica una fuente distinta a cada bloque.
    */
  </style>
</head>
<body>
  <main class="fonts-demo">
    <section class="font-card font-card--system">
      <h1>Fuente del sistema</h1>
      <p>Este bloque debe usar una tipografía ya disponible en el sistema operativo.</p>
    </section>

    <section class="font-card font-card--google">
      <h2>Google Font</h2>
      <p>Este bloque debe usar una fuente cargada desde Google Fonts.</p>
    </section>

    <section class="font-card font-card--local">
      <h2>Fuente descargada</h2>
      <p>Este bloque debe usar una fuente definida manualmente con @font-face.</p>
    </section>
  </main>
</body>
</html>
