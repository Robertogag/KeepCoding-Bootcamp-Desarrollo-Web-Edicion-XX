<title>Ejercicio Variables de Color CSS</title>

<!--
OBJETIVO
Aprender a definir y utilizar variables de color en CSS usando :root.

Debes:

1. Definir variables CSS en :root para:
   - color primario (HEX)
   - color secundario (RGB)
   - color de acento (HSL)
   - color de fondo
   - color de texto

2. Utilizar las variables en los estilos de la página.

3. Aplicar los colores a:
   - fondo de la página
   - título
   - botón
   - tarjeta de contenido

Pista:
Las variables CSS se definen así:

:root {
  --mi-variable: valor;
}

Y se usan así:

color: var(--mi-variable);
-->
