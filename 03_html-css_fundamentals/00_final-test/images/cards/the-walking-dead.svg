<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" role="img" aria-labelledby="title desc">
  <title id="title">The Walking Dead</title>
  <desc id="desc">Poster placeholder for The Walking Dead.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f2518" />
      <stop offset="100%" stop-color="#5e4a31" />
    </linearGradient>
  </defs>
  <rect width="600" height="750" fill="url(#bg)" />
  <rect x="80" y="220" width="440" height="220" rx="28" fill="#ffffff" opacity="0.08" />
  <rect x="50" y="520" width="500" height="160" rx="24" fill="#0f1117" opacity="0.46" />
  <text x="50" y="590" fill="#ffffff" font-family="Arial, sans-serif" font-size="38" font-weight="700">THE WALKING</text>
  <text x="50" y="640" fill="#ffffff" font-family="Arial, sans-serif" font-size="38" font-weight="700">DEAD</text>
</svg>
