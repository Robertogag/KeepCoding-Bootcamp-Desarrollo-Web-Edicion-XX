<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Hero banner</title>
  <desc id="desc">Illustrated hero banner for the StreamBox landing page.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#29070b" />
      <stop offset="50%" stop-color="#141824" />
      <stop offset="100%" stop-color="#2e203d" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
