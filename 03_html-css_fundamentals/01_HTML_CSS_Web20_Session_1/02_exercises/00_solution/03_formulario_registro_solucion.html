<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solución · Formulario de registro</title>
</head>
<body>
  <header>
    <h1>Formulario de registro</h1>
    <p>Ejemplo resuelto con elementos HTML interactivos.</p>
  </header>

  <main>
    <form action="#" method="post">
      <fieldset>
        <legend>Datos personales</legend>

        <p>
          <label for="nombre">Nombre completo</label><br>
          <input type="text" id="nombre" name="nombre">
        </p>

        <p>
          <label for="email">Correo electrónico</label><br>
          <input type="email" id="email" name="email">
        </p>

        <p>
          <label for="password">Contraseña</label><br>
          <input type="password" id="password" name="password">
        </p>

        <p>
          <label for="fecha">Fecha de nacimiento</label><br>
          <input type="date" id="fecha" name="fecha">
        </p>
      </fieldset>

      <fieldset>
        <legend>Información adicional</legend>

        <p>
          <label for="perfil">Perfil</label><br>
          <select id="perfil" name="perfil">
            <option value="">Selecciona una opción</option>
            <option value="estudiante">Estudiante</option>
            <option value="junior">Desarrollador junior</option>
            <option value="disenador">Diseñador</option>
          </select>
        </p>

        <p>
          <span>Modalidad</span><br>
          <input type="radio" id="online" name="modalidad" value="online">
          <label for="online">Online</label>

          <input type="radio" id="presencial" name="modalidad" value="presencial">
          <label for="presencial">Presencial</label>
        </p>

        <p>
          <span>Intereses</span><br>
          <input type="checkbox" id="html" name="intereses" value="html">
          <label for="html">HTML</label>

          <input type="checkbox" id="css" name="intereses" value="css">
          <label for="css">CSS</label>

          <input type="checkbox" id="accesibilidad" name="intereses" value="accesibilidad">
          <label for="accesibilidad">Accesibilidad</label>
        </p>

        <p>
          <label for="comentarios">Comentarios</label><br>
          <textarea id="comentarios" name="comentarios" rows="5" cols="40"></textarea>
        </p>
      </fieldset>

      <p>
        <input type="checkbox" id="condiciones" name="condiciones">
        <label for="condiciones">Acepto las condiciones del curso</label>
      </p>

      <button type="submit">Enviar</button>
      <button type="reset">Limpiar</button>
    </form>
  </main>

  <footer>
    <p>Práctica resuelta de formulario.</p>
  </footer>
</body>
</html>
