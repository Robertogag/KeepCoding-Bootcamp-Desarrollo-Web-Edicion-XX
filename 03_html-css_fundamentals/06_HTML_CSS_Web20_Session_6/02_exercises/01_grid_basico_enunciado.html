<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 1 · Grid básico</title>
  <style>
    /*
    EJERCICIO 1 · GRID BÁSICO

    OBJETIVO
    Crear una rejilla simple con columnas iguales.

    INSTRUCCIONES
    1. Convierte .grid en un contenedor grid.
    2. Crea 3 columnas iguales.
    3. Añade separación entre cajas.
    4. Da estilo visual a cada item.
    5. Mantén una estructura limpia.
    */
  </style>
</head>
<body>
  <section class="grid">
    <article class="item">1</article>
    <article class="item">2</article>
    <article class="item">3</article>
    <article class="item">4</article>
    <article class="item">5</article>
    <article class="item">6</article>
  </section>
</body>
</html>
