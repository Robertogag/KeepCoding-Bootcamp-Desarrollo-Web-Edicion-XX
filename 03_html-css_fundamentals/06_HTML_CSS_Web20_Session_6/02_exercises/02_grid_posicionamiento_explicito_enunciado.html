<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 2 · Posicionamiento explícito</title>
  <style>
    /*
    EJERCICIO 2 · POSICIONAMIENTO EXPLÍCITO

    OBJETIVO
    Hacer que algunos elementos ocupen más espacio dentro del grid.

    INSTRUCCIONES
    1. Crea una rejilla de 4 columnas.
    2. Haz que .item--featured ocupe 2 columnas.
    3. Haz que .item--tall ocupe 2 filas.
    4. Añade filas automáticas con altura mínima.
    5. Mantén buen espaciado visual.
    */
  </style>
</head>
<body>
  <section class="grid">
    <article class="item item--featured">Destacado</article>
    <article class="item">2</article>
    <article class="item item--tall">Alto</article>
    <article class="item">4</article>
    <article class="item">5</article>
    <article class="item">6</article>
  </section>
</body>
</html>
