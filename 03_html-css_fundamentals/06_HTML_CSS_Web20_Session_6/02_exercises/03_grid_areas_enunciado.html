<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 3 · Grid areas</title>
  <style>
    /*
    EJERCICIO 3 · GRID AREAS

    OBJETIVO
    Organizar una página sencilla usando áreas de grid.

    INSTRUCCIONES
    1. Convierte .layout en grid.
    2. Define áreas para:
       - header
       - sidebar
       - main
       - footer
    3. Coloca cada bloque en su área correspondiente.
    4. En móvil, apila las áreas en una sola columna.
    5. Usa media query para adaptar el layout.
    */
  </style>
</head>
<body>
  <div class="layout">
    <header class="header">Header</header>
    <aside class="sidebar">Sidebar</aside>
    <main class="main">Main</main>
    <footer class="footer">Footer</footer>
  </div>
</body>
</html>
