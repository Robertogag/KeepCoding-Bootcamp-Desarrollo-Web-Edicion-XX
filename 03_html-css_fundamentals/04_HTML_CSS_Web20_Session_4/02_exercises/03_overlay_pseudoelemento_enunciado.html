<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 3 · Overlay con pseudoelemento</title>
  <style>
    /*
    OBJETIVO
    Crear un overlay sin añadir HTML extra.

    INSTRUCCIONES
    1. Usa una imagen de fondo en .card-hero.
    2. Crea un overlay oscuro con ::before.
    3. Haz que el texto quede por encima del overlay.
    4. Usa position relative y absolute correctamente.
    5. Añade padding y buen contraste.
    */
  </style>
</head>
<body>
  <section class="card-hero">
    <div class="card-hero__content">
      <h1>Overlay con pseudoelemento</h1>
      <p>Separa estructura y presentación creando capas visuales sin modificar el HTML.</p>
    </div>
  </section>
</body>
</html>
