<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 1 · Gradientes</title>
  <style>
    /*
    OBJETIVO
    Practicar fondos con gradientes.

    INSTRUCCIONES
    1. Crea un hero que ocupe al menos el alto visible inicial.
    2. Aplica un gradiente lineal como fondo.
    3. Centra el contenido.
    4. Mejora el contraste del texto.
    5. Añade un botón principal.

    PISTA
    Usa linear-gradient() dentro de background.
    */
  </style>
</head>
<body>
  <section class="hero">
    <h1>Gradientes en CSS</h1>
    <p>Utiliza fondos dinámicos para crear atmósfera y profundidad visual.</p>
    <button>Explorar</button>
  </section>
</body>
</html>
