<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 5 · Transformaciones</title>
  <style>
    /*
    OBJETIVO
    Practicar transformaciones visuales sin afectar al layout.

    INSTRUCCIONES
    1. Estiliza tres bloques.
    2. Aplica una transformación distinta en hover:
       - mover
       - escalar
       - rotar
    3. Añade transición para suavizar cada efecto.
    4. Mantén coherencia visual entre los tres bloques.
    5. Añade una sombra sutil en hover.
    */
  </style>
</head>
<body>
  <section class="cards">
    <div class="box box--move">Mover</div>
    <div class="box box--scale">Escalar</div>
    <div class="box box--rotate">Rotar</div>
  </section>
</body>
</html>
