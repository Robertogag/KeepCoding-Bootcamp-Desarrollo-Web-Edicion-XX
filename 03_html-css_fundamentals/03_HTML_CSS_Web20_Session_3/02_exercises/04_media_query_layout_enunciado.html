<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 4 · Media query layout</title>
  <style>
    /*
    EJERCICIO 4 · LAYOUT RESPONSIVE

    OBJETIVO
    Cambiar la estructura del layout según el tamaño de pantalla.

    INSTRUCCIONES
    1. En escritorio, coloca .content y .sidebar en dos columnas.
    2. En pantallas pequeñas, apila ambas zonas en una sola columna.
    3. Reduce también el tamaño del h1 en móvil.
    4. Mantén separación entre bloques.
    */
  </style>
</head>
<body>
  <main class="layout">
    <section class="content">
      <h1>Título principal</h1>
      <p>Este contenido debe adaptarse correctamente al tamaño de pantalla.</p>
    </section>
    <aside class="sidebar">
      <h2>Sidebar</h2>
      <p>Información complementaria.</p>
    </aside>
  </main>
</body>
</html>
