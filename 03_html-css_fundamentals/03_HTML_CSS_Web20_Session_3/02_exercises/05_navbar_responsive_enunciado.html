<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 5 · Navbar responsive</title>
  <style>
    /*
    EJERCICIO 5 · NAVBAR RESPONSIVE

    OBJETIVO
    Construir una navegación flexible que cambie en móvil.

    INSTRUCCIONES
    1. Distribuye logo, menú y botón con Flexbox.
    2. Alinea verticalmente los elementos.
    3. Añade espacio entre enlaces.
    4. En móvil, haz que la navbar se apile.
    5. En móvil, el menú debe pasar de horizontal a vertical.
    */
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar__logo">KC</div>
    <nav class="navbar__menu">
      <a href="#">Inicio</a>
      <a href="#">Cursos</a>
      <a href="#">Precios</a>
      <a href="#">Contacto</a>
    </nav>
    <button class="navbar__button">Acceder</button>
  </header>
</body>
</html>
