<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 6 · Galería responsive</title>
  <style>
    /*
    EJERCICIO 6 · GALERÍA RESPONSIVE

    OBJETIVO
    Crear una galería de cajas con Flexbox y adaptarla a móvil.

    INSTRUCCIONES
    1. Coloca las cajas en varias columnas usando flex-wrap.
    2. Da a cada elemento un ancho base razonable.
    3. Añade gap entre elementos.
    4. En móvil, haz que cada caja ocupe todo el ancho disponible.
    */
  </style>
</head>
<body>
  <section class="gallery">
    <div class="gallery__item">1</div>
    <div class="gallery__item">2</div>
    <div class="gallery__item">3</div>
    <div class="gallery__item">4</div>
    <div class="gallery__item">5</div>
    <div class="gallery__item">6</div>
  </section>
</body>
</html>
