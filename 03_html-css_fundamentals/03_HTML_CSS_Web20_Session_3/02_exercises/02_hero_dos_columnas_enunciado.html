<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 2 · Hero dos columnas</title>
  <style>
    /*
    EJERCICIO 2 · HERO A DOS COLUMNAS

    OBJETIVO
    Crear un layout horizontal con texto a la izquierda y bloque visual a la derecha.

    INSTRUCCIONES
    1. Convierte .hero en un contenedor flex.
    2. Haz que .hero__content y .hero__visual queden uno al lado del otro.
    3. Centra verticalmente el contenido.
    4. Añade gap y padding al contenedor.
    5. Si quieres, da más espacio al bloque de texto usando flex.
    */
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__content">
      <h1>Aprende Flexbox</h1>
      <p>Construye interfaces modernas alineando y distribuyendo elementos de forma flexible.</p>
      <button>Empezar</button>
    </div>
    <div class="hero__visual">
      <span>Zona visual</span>
    </div>
  </section>
</body>
</html>
