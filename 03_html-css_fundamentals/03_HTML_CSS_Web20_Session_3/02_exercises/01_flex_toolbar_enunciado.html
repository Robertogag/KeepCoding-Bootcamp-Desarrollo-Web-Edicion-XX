<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 1 · Toolbar con Flexbox</title>
  <style>
    /*
    EJERCICIO 1 · TOOLBAR CON FLEXBOX

    OBJETIVO
    Entender cómo funciona un contenedor flex y cómo se alinean sus hijos.

    INSTRUCCIONES
    1. Convierte .toolbar en un contenedor flex.
    2. Coloca los elementos en una misma fila.
    3. Separa los bloques principales usando justify-content.
    4. Centra verticalmente todos los elementos.
    5. Añade gap al menú para separar los enlaces.
    */
  </style>
</head>
<body>
  <header class="toolbar">
    <div class="toolbar__logo">WEB20</div>
    <nav class="toolbar__menu">
      <a href="#">Inicio</a>
      <a href="#">Cursos</a>
      <a href="#">Blog</a>
      <a href="#">Contacto</a>
    </nav>
    <button class="toolbar__button">Acceder</button>
  </header>
</body>
</html>
