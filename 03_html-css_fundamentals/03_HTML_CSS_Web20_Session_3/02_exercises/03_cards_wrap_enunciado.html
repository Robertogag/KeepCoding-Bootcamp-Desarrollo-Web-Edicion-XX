<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 3 · Cards con wrap</title>
  <style>
    /*
    EJERCICIO 3 · CARDS CON FLEX-WRAP

    OBJETIVO
    Distribuir varias tarjetas en filas adaptables.

    INSTRUCCIONES
    1. Convierte .cards en un contenedor flex.
    2. Permite que las cards salten a otra línea cuando no haya espacio.
    3. Añade gap entre tarjetas.
    4. Da a cada card una base razonable usando flex-basis o flex.
    5. Añade un estilo visual simple a cada tarjeta.
    */
  </style>
</head>
<body>
  <section class="cards">
    <article class="card">Card 1</article>
    <article class="card">Card 2</article>
    <article class="card">Card 3</article>
    <article class="card">Card 4</article>
    <article class="card">Card 5</article>
    <article class="card">Card 6</article>
  </section>
</body>
</html>
